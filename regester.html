<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register – Nine Realms Fan Club</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="page-bg">
        <div class="page-overlay"></div>
        <div class="page-content">
            <div class="center-box">
                <h1>Create Your Fan Account</h1>

                <input type="email" id="regEmail" class="input-field" placeholder="Email">
                <input type="password" id="regPassword" class="input-field" placeholder="Password">

                <button class="btn btn-gold" onclick="registerUser()">Register</button>

                <div style="margin-top:10px;">
                    <span class="link-red" onclick="window.location.href='index.html'">Back to Login</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
