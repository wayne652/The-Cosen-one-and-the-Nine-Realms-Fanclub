<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nine Realms – Home</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body id="homeBody" onload="renderHome()">

  <div class="page-bg">
    <div class="page-overlay"></div>
    <div class="page-content">
      <div class="center-box">
        <h1>The Chosen One and the Nine Realms Fan Club</h1>

        <button class="btn btn-gold" onclick="goToRealms()">Enter the Realms</button>
        <button class="btn btn-gold-outline" onclick="goToReviews()">Reviews & Comments</button>

        <h2>Updates / News</h2>
        <div class="news-box" id="newsBox"></div>
      </div>
    </div>
  </div>
</body>
</html>
<script>
    try {
        let data = JSON.parse(localStorage.getItem("data"));
        if (data && data.homepageBackground) {
            let body = document.getElementById("homeBody");
            body.style.backgroundImage = `url('${data.homepageBackground}')`;
            body.style.backgroundSize = "cover";
            body.style.backgroundPosition = "center";
        }
    } catch (e) {
        console.log("No background set yet.");
    }
</script>
