<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Chosen One and the Nine Realms – Gate</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div class="page-bg">
    <div class="page-overlay"></div>
    <div class="page-content">
      <div class="center-box">
        <h1>Welcome to the Chosen One and Nine Realms Fan Club</h1>

        <input type="email" id="email" class="input-field" placeholder="Email">
        <input type="password" id="password" class="input-field" placeholder="Password">

        <button class="btn btn-gold" onclick="fakeRegister()">Register</button>
        <button class="btn btn-gold-outline" onclick="fakeLogin()">Login</button>

        <div style="margin-top:10px;">
          <span class="link-red" onclick="forgotPassword()">Forgot Password?</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
